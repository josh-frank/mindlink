<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --panel: #161616;
      --border: #2a2a2a;
      --red: #c0392b;
      --red-glow: #e74c3c;
      --green: #22c55e;
      --grey: #6b7280;
      --text: #d4d0c8;
      --text-dim: #555;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── header ── */
    header {
      width: 100%;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--text);
    }

    .logo span {
      color: var(--red);
    }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    #status-dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── main layout ── */
    main {
      width: 100%;
      max-width: 900px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── meter panel ── */
    .meter-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #meter-svg-wrap {
      width: min(480px, 100%);
      aspect-ratio: 1 / 0.6;
      position: relative;
    }

    /* ── tone arm + sensitivity row ── */
    .controls-row {
      display: flex;
      gap: 16px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .knob-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .knob-svg {
      width: 72px;
      height: 72px;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .knob-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    .knob-val {
      font-size: 12px;
      color: var(--amber);
      text-align: center;
      min-width: 40px;
    }

    /* ── readouts ── */
    .readouts {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .readout {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .readout-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .readout-val {
      font-size: 16px;
      color: var(--amber);
    }

    /* ── polygram ── */
    .polygram-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
    }

    .polygram-title {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    #polygram-svg {
      width: 100%;
      height: 140px;
      display: block;
    }

    /* ── footer ── */
    footer {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 16px;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Mind<span>Link</span></div>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">disconnected</span>
    </div>
  </header>

  <main>

    <!-- ── meter ── -->
    <div class="meter-panel">
      <div id="meter-svg-wrap">
        <svg id="meter-svg" viewBox="-45 -30 90 60" style="width:100%;height:100%" preserveAspectRatio="xMidYMid meet">
          <defs id="label-paths"></defs>
          <g id="scale-group"></g>
          <!--
          <path id="needle" d="m -0.8 0 l 0.8 -28 l 0.8 0 z" fill="var(--red)"
            style="transform-origin:0 0;transform:rotate(-90deg)" />
          -->
           <line x1="0" y1="0" x2="-28" y2="0" stroke="var(--red)" stroke-width="0.2" />
          <circle cx="0" cy="-28" r="1.2" fill="var(--red)" id="needle-tip"
            style="transform-origin:0 0;transform:rotate(-90deg)" />
          <circle cx="0" cy="0" r="2" fill="#2c3e50" />
        </svg>
      </div>

      <!-- knobs -->
      <div class="controls-row">
        <div class="knob-wrap">
          <svg id="ta-knob" class="knob-svg" viewBox="0 0 16 16" touch-action="none"></svg>
          <div class="knob-label">Tone Arm</div>
          <div class="knob-val" id="ta-val">2.0</div>
        </div>
        <div class="knob-wrap">
          <svg id="sens-knob" class="knob-svg" viewBox="0 0 16 16" touch-action="none"></svg>
          <div class="knob-label">Sensitivity</div>
          <div class="knob-val" id="sens-val">8</div>
        </div>
      </div>

      <!-- readouts -->
      <div class="readouts">
        <div class="readout">
          <div class="readout-label">µS</div>
          <div class="readout-val" id="r-us">—</div>
        </div>
        <div class="readout">
          <div class="readout-label">Delta</div>
          <div class="readout-val" id="r-delta">—</div>
        </div>
        <div class="readout">
          <div class="readout-label">TA</div>
          <div class="readout-val" id="r-ta">—</div>
        </div>
        <div class="readout">
          <div class="readout-label">Warmed</div>
          <div class="readout-val" id="r-warmed">—</div>
        </div>
      </div>
    </div>

    <!-- ── polygram ── -->
    <div class="polygram-panel">
      <div class="polygram-title">Polygram — 30s window</div>
      <svg id="polygram-svg" viewBox="0 0 800 120" preserveAspectRatio="none"></svg>
    </div>

  </main>

  <footer>MindLink · open source biofeedback</footer>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // E-METER SCALE
    // ═══════════════════════════════════════════════════════════════════════════
    (function buildScale() {
      const START = -90, END = 90;   // needle travel: left=-90°, right=+90°
      const RISE = 6, SET = 3, FALL = 9, TOTAL = 18;
      const R_OUTER = 35, R_INNER = 33, R_LABEL = 37, R_TICK_OUT = 35;

      const svg = document.getElementById('meter-svg');
      const defs = document.getElementById('label-paths');
      const group = document.getElementById('scale-group');

      function pt(angleDeg, r) {
        const a = (angleDeg - 90) * Math.PI / 180;
        return [Math.cos(a) * r, Math.sin(a) * r];
      }

      function arcPath(a1, a2, r) {
        const [x1, y1] = pt(a1, r), [x2, y2] = pt(a2, r);
        const large = (a2 - a1) > 180 ? 1 : 0;
        return `M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`;
      }

      function sectorPath(a1, a2) {
        const [ox1, oy1] = pt(a1, R_OUTER), [ox2, oy2] = pt(a2, R_OUTER);
        const [ix1, iy1] = pt(a1, R_INNER), [ix2, iy2] = pt(a2, R_INNER);
        const lg = (a2 - a1) > 180 ? 1 : 0;
        return `M${ix1},${iy1} L${ox1},${oy1} A${R_OUTER},${R_OUTER} 0 ${lg} 1 ${ox2},${oy2} L${ix2},${iy2} A${R_INNER},${R_INNER} 0 ${lg} 0 ${ix1},${iy1} Z`;
      }

      const sectionAngle = (i) => START + (i / TOTAL) * (END - START);
      const riseEnd = sectionAngle(RISE);
      const setEnd = sectionAngle(RISE + SET);

      // colored sectors
      const sectors = [
        { d: sectorPath(START, riseEnd), fill: '#22c55e' },
        { d: sectorPath(riseEnd, setEnd), fill: '#6b7280' },
        { d: sectorPath(setEnd, END), fill: '#c0392b' },
      ];
      sectors.forEach(s => {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', s.d); p.setAttribute('fill', s.fill);
        group.appendChild(p);
      });

      // tick marks
      for (let i = 0; i <= TOTAL; i++) {
        const a = sectionAngle(i);
        const major = (i === 0 || i === RISE || i === RISE + SET || i === TOTAL);
        const r_in = major ? 28 : 30;
        const [x1, y1] = pt(a, r_in), [x2, y2] = pt(a, R_TICK_OUT);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#2c3e50');
        line.setAttribute('stroke-width', major ? '1' : '0.5');
        group.appendChild(line);
      }

      // label arc paths
      [
        { id: 'rise-arc', a1: START, a2: riseEnd },
        { id: 'set-arc', a1: riseEnd, a2: setEnd },
        { id: 'fall-arc', a1: setEnd, a2: END },
      ].forEach(({ id, a1, a2 }) => {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('id', id);
        p.setAttribute('d', arcPath(a1, a2, R_LABEL));
        p.setAttribute('fill', 'none'); p.setAttribute('stroke', 'none');
        defs.appendChild(p);
      });

      // section labels
      [
        { href: '#rise-arc', text: 'RISE' },
        { href: '#set-arc', text: 'SET' },
        { href: '#fall-arc', text: 'FALL' },
      ].forEach(({ href, text }) => {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('font-size', '3');
        t.setAttribute('letter-spacing', '2');
        t.setAttribute('fill', '#2c3e50');
        t.setAttribute('font-weight', 'bold');
        t.setAttribute('font-family', 'Share Tech Mono, monospace');
        const tp = document.createElementNS('http://www.w3.org/2000/svg', 'textPath');
        tp.setAttribute('href', href);
        tp.setAttribute('startOffset', '50%');
        tp.setAttribute('text-anchor', 'middle');
        tp.textContent = text;
        t.appendChild(tp);
        group.appendChild(t);
      });

      // main arc outline
      const arc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      arc.setAttribute('d', arcPath(START, END, R_OUTER));
      arc.setAttribute('fill', 'none');
      arc.setAttribute('stroke', '#2c3e50');
      arc.setAttribute('stroke-width', '1.5');
      group.appendChild(arc);
    })();


    // ═══════════════════════════════════════════════════════════════════════════
    // NEEDLE PHYSICS  (spring + damping)
    // ═══════════════════════════════════════════════════════════════════════════
    const needle = document.getElementById('needle');
    const needleTip = document.getElementById('needle-tip');

    let currentAngle = -90;
    let targetAngle = -90;
    let velocity = 0;
    let rafId = null;

    const SPRING = 0.0325;
    const DAMPING = 0.925;
    const MIN_VEL = 0.01;
    const ANG_MIN = -90;
    const ANG_MAX = 90;

    function animateNeedle() {
      const delta = targetAngle - currentAngle;
      velocity = (velocity + delta * SPRING) * DAMPING;
      let next = currentAngle + velocity;

      if (next < ANG_MIN) { next = ANG_MIN; velocity = Math.abs(velocity) * 0.6; }
      if (next > ANG_MAX) { next = ANG_MAX; velocity = -Math.abs(velocity) * 0.6; }

      currentAngle = next;
      const t = `rotate(${currentAngle}deg)`;
      needle.style.transform = t;
      needleTip.style.transform = t;

      if (Math.abs(velocity) > MIN_VEL || Math.abs(delta) > 0.1)
        rafId = requestAnimationFrame(animateNeedle);
      else rafId = null;
    }

    function setNeedle(norm) {            // norm 0..1
      targetAngle = ANG_MIN + norm * (ANG_MAX - ANG_MIN);
      if (!rafId) { velocity += (targetAngle - currentAngle) * 0.125; rafId = requestAnimationFrame(animateNeedle); }
    }


    // ═══════════════════════════════════════════════════════════════════════════
    // KNOB
    // ═══════════════════════════════════════════════════════════════════════════
    function makeKnob(svgEl, { min, max, value, startAngle, endAngle, numMarks, onchange }) {
      let val = value;

      function draw() {
        while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
        const arcRange = endAngle - startAngle;
        const R = 6.5, CX = 8, CY = 8;

        // arc background
        const toRad = a => ((a - 90) * Math.PI / 180);
        const px = (a, r) => [CX + r * Math.cos(toRad(a)), CY + r * Math.sin(toRad(a))];
        const [sx, sy] = px(startAngle, R), [ex, ey] = px(endAngle, R);
        const lg = arcRange > 180 ? 1 : 0;
        const arc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arc.setAttribute('d', `M${sx},${sy} A${R},${R} 0 ${lg} 1 ${ex},${ey}`);
        arc.setAttribute('fill', 'none'); arc.setAttribute('stroke', '#2a2a2a'); arc.setAttribute('stroke-width', '0.8');
        svgEl.appendChild(arc);

        // ticks
        for (let i = 0; i < numMarks; i++) {
          const a = startAngle + (i / (numMarks - 1)) * arcRange;
          const hi = (i % 2 === 0 || i === numMarks - 1);
          const [x1, y1] = px(a, 6), [x2, y2] = px(a, hi ? 8 : 7.5);
          const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          l.setAttribute('x1', x1); l.setAttribute('y1', y1);
          l.setAttribute('x2', x2); l.setAttribute('y2', y2);
          l.setAttribute('stroke', hi ? '#555' : '#333');
          l.setAttribute('stroke-width', hi ? '0.4' : '0.15');
          svgEl.appendChild(l);
        }

        // pointer
        const norm = (val - min) / (max - min);
        const dispAngle = startAngle + norm * arcRange;
        const ptr = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        ptr.setAttribute('d', 'M 16 8 L 3 7 L 3 9 Z M 10 8 A 2 2 0 1 0 6 8 A 2 2 0 1 0 10 8 Z');
        ptr.setAttribute('fill', 'var(--red)');
        ptr.setAttribute('style', `transform-origin:8px 8px;transform:rotate(${dispAngle - 90}deg)`);
        svgEl.appendChild(ptr);
      }

      draw();

      // drag
      let dragging = false, center = {};
      svgEl.addEventListener('pointerdown', e => {
        e.preventDefault(); dragging = true;
        const r = svgEl.getBoundingClientRect();
        center = { x: r.x + r.width / 2, y: r.y + r.height / 2 };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', up);
      });

      function move(e) {
        if (!dragging) return;
        // angle in degrees clockwise from top (0° = 12 o'clock)
        let angle = Math.atan2(e.clientX - center.x, -(e.clientY - center.y)) * 180 / Math.PI;

        // startAngle/endAngle are also clockwise-from-top (e.g. -140 .. 140)
        // Normalise startAngle into 0-360 space for wrap arithmetic
        const arcRange = endAngle - startAngle;
        const startNorm = ((startAngle % 360) + 360) % 360;   // e.g. 220 for -140
        let angleNorm = ((angle % 360) + 360) % 360;

        let rel = angleNorm - startNorm;
        if (rel < 0) rel += 360;
        // If we're past the end, snap to nearest limit
        if (rel > arcRange) rel = (rel - arcRange > (360 - arcRange) / 2) ? 0 : arcRange;

        val = min + (rel / arcRange) * (max - min);
        val = Math.max(min, Math.min(max, val));
        draw();
        onchange(val);
      }

      function up() {
        dragging = false;
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
      }

      return { getValue: () => val };
    }

    // tone arm: 1.0 – 3.5
    const taKnob = makeKnob(document.getElementById('ta-knob'), {
      min: 1.0, max: 3.5, value: 2.0,
      startAngle: -140, endAngle: 140, numMarks: 15,
      onchange: v => { document.getElementById('ta-val').textContent = v.toFixed(1); }
    });

    // sensitivity: 1 – 16
    const sensKnob = makeKnob(document.getElementById('sens-knob'), {
      min: 1, max: 16, value: 8,
      startAngle: -140, endAngle: 140, numMarks: 9,
      onchange: v => { document.getElementById('sens-val').textContent = Math.round(v); }
    });


    // ═══════════════════════════════════════════════════════════════════════════
    // POLYGRAM  (30-second rolling chart)
    // ═══════════════════════════════════════════════════════════════════════════
    const polySvg = document.getElementById('polygram-svg');
    const WINDOW_MS = 30000;
    const W = 800, H = 120, ML = 0, MT = 10, MB = 10;
    const CW = W - ML, CH = H - MT - MB;
    let polyData = [];   // {t, uS}

    // grid
    (function () {
      for (let i = 0; i <= 20; i++) {
        const x = ML + (i / 20) * CW;
        const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        l.setAttribute('x1', x); l.setAttribute('y1', MT);
        l.setAttribute('x2', x); l.setAttribute('y2', H - MB);
        l.setAttribute('stroke', i % 5 === 0 ? '#2a2a2a' : '#1a1a1a');
        l.setAttribute('stroke-width', i % 5 === 0 ? '0.8' : '0.3');
        polySvg.appendChild(l);
      }
      for (let i = 0; i <= 5; i++) {
        const y = MT + (i / 5) * CH;
        const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        l.setAttribute('x1', ML); l.setAttribute('y1', y);
        l.setAttribute('x2', W); l.setAttribute('y2', y);
        l.setAttribute('stroke', i % 2 === 0 ? '#2a2a2a' : '#1a1a1a');
        l.setAttribute('stroke-width', '0.4');
        polySvg.appendChild(l);
      }
    })();

    const polyPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    polyPath.setAttribute('fill', 'none');
    polyPath.setAttribute('stroke', 'var(--red)');
    polyPath.setAttribute('stroke-width', '1.5');
    polyPath.setAttribute('stroke-linecap', 'round');
    polyPath.setAttribute('stroke-linejoin', 'round');
    polySvg.appendChild(polyPath);

    const polyDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    polyDot.setAttribute('r', '3');
    polyDot.setAttribute('fill', 'var(--red-glow)');
    polySvg.appendChild(polyDot);

    let usMin = 0, usMax = 50;

    function updatePolygram(uS) {
      const now = Date.now();
      polyData.push({ t: now, uS });
      polyData = polyData.filter(p => now - p.t <= WINDOW_MS);

      // auto-range
      if (polyData.length > 5) {
        const vals = polyData.map(p => p.uS);
        const lo = Math.min(...vals), hi = Math.max(...vals);
        const pad = Math.max((hi - lo) * 0.2, 2);
        usMin = lo - pad; usMax = hi + pad;
      }

      const range = usMax - usMin || 1;
      let d = '';
      polyData.forEach((p, i) => {
        const age = now - p.t;
        const x = ML + CW * (1 - age / WINDOW_MS);
        const y = MT + CH * (1 - (p.uS - usMin) / range);
        d += (i === 0 ? `M${x.toFixed(1)},${y.toFixed(1)}` : `L${x.toFixed(1)},${y.toFixed(1)}`);
      });
      polyPath.setAttribute('d', d);

      if (polyData.length) {
        const last = polyData[polyData.length - 1];
        const x = ML + CW;
        const y = MT + CH * (1 - (last.uS - usMin) / range);
        polyDot.setAttribute('cx', x);
        polyDot.setAttribute('cy', y);
      }
    }


    // ═══════════════════════════════════════════════════════════════════════════
    // WEBSOCKET
    // ═══════════════════════════════════════════════════════════════════════════
    const dot = document.getElementById('status-dot');
    const stText = document.getElementById('status-text');

    function connect() {
      const ws = new WebSocket(`ws://${location.hostname}:5001`);

      ws.onopen = () => {
        dot.classList.add('live');
        stText.textContent = 'live';
      };

      ws.onclose = () => {
        dot.classList.remove('live');
        stText.textContent = 'reconnecting…';
        setTimeout(connect, 2000);
      };

      ws.onmessage = ({ data }) => {
        const f = JSON.parse(data);

        // tone arm + sensitivity adjustment
        const ta = taKnob.getValue();
        const sens = sensKnob.getValue();
        const baselineAdj = (ta - 2.0) * 10;
        const sensMul = Math.pow(sens / 8, 1.5);
        let norm = ((f.smooth_uS + baselineAdj) * sensMul);

        // map µS to 0..1 across a reasonable range (1–10 µS)
        norm = (norm - 1) / (10 - 1);
        norm = Math.max(0, Math.min(1, norm));
        setNeedle(norm);

        // readouts
        document.getElementById('r-us').textContent = f.smooth_uS.toFixed(2);
        document.getElementById('r-delta').textContent = f.delta;
        document.getElementById('r-ta').textContent = f.ta.toFixed(2);
        document.getElementById('r-warmed').textContent = f.warmed ? '✓' : '…';

        updatePolygram(f.smooth_uS);
      };
    }

    connect();
  </script>
</body>

</html>
